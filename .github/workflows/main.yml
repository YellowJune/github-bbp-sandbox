name: Advanced Security Impact Testing

on:
  workflow_dispatch:
    inputs:
      malicious_input:
        description: 'Input for exploitation'
        required: false
        default: 'safe'

jobs:
  exploit_job:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Untrusted Input Execution
        env:
          MY_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          echo "Processing: ${{ github.event.inputs.malicious_input }}"
          # Vulnerable eval
          eval "echo ${{ github.event.inputs.malicious_input }}"

      - name: Step 2 - Environment Poisoning Test
        run: |
          echo "This step uses variables set in Step 1"
          echo "Current Path: $PATH"
          echo "Target Secret: $TARGET_SECRET"

      - name: Step 3 - Persistence Check
        run: |
          if [ -f "/tmp/pwned" ]; then
            echo "Persistence achieved in runner!"
            cat /tmp/pwned
          fi
